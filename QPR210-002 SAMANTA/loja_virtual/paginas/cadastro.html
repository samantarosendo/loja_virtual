<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Évora</title>        
    <link rel="shortcut icon" href="imagens loja/icones/favicon.ico.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/cadastro.css">
    <link rel="stylesheet" href="/css/style_estrutura_paginas.css">
</head>
<body>
    <main id="geral">
        <header id="cabecalho">
            <div id="logo_img">
                <a href="index.html">
                    <img src="imagens loja/icones/logo.png" type= "logo_img">
                </a>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="index.html" class="link_menu"> Home </a></li>
                    <li><a href="paginas/cadastro.html" class="link_menu"> Cadastro </a></li>
                    <li><a href="paginas/sobre.html" class="link_menu"> Sobre </a></li>
                </ul>
            </nav>

            <div id="div-icones">
                <ul>
                    <li><a href="/paginas/login.html" class="link_icone"><img src="imagens loja/icones/login.png" alt=""></a></li>
                    <li><a href="/paginas/carrinho.html" class="link_icone"><img src="imagens loja/icones/carrinho.png" alt=""></a></li>
                </ul>
            </div>
        </header>
        <section id="pesquisa">
            <input type="text" name="pesquisa" id="txtPesquisa" placeholder="Digite seu produto">
        </section>

        <section id="form">
            <h1>criar nova conta</h1>
            <h5>preencha seus dados para se cadastrar</h5>

            <form id="formCadastro">
                <label for="nome">Nome Completo</label>
            <input type="text" name="none" class="input01" required>

            <label for="cpf">CPF</label>
            <input type="number" name="CPF" id="CPF" maxlength="14" class="input02" required>

            <label for="dataNasc">Data Nascimento</label>
            <input type="date" name="dataNasc" id="dataNasc" class="input01" required>

            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sxF" required value="F">Feminino
            <input type="radio" name="sexo" id="sxM" required value="M">Masculino

            <label for="cep">CEP</label>
            <input type="number" name="cep" id="cep" required maxlength="9">

            <div id="dadosEndereco" class="oculto">
                <label for="logradouro">logradouro</label>
                <input type="text" name="logradouro" id="logradouro" class="input01">

                <label for="numResidencia">Número</label>
                <input type="text" name="nem" id="logradouro" class="input01">

                <label for="logradouro">Complemento</label>
                <input type="text" name="logradouro" id="logradouro" class="input01">

                <label for="bairro">Bairro</label>
                <input type="text" name="bairro" id="bairro" class="input01">

                <label for="localidade">Localidade</label>
                <input type="text" name="localidade" id="localidade" class="input01">

                <label for="uf">UF</label>
                <input type="text" name="uf" id="uf" class="input01">
            </div>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input02" required maxlength="6" placeholder="informe a senha">

            <div id="div-btns">
                <button type="submit" id="btn-add">Cadastrar</button>
                <button type="reset" id="btn-limpar">Limpar</button>
            </div>
            </form>


        </section>

         <footer id="rodape">
            <div id="dadosloja">
                <h2>Rua Otavio Cadilac, 3000 - Centro</h2>
                <h1>Aracaju - Sergipe</h1>
            </div>

            <div id="icones_sociais">
                <ul>
                    <li><a href="https:www.instagram.com/evorabeauty"><img src="imagens loja/icones/instagram.png" alt=""></a>/li>
                    <li><a href="https:www.facebook.com/evorabeauty"><img src="imagens loja/icones/instagram.png" alt=""></a>/li>
                </ul>
            </div>

            <div id="div-cartoes">
                <img src="imagens loja/icones/hipercard.png" alt="Hipercard">
                <img src="imagens loja/icones/visa.png" alt="Visa">
                <img src="imagens loja/icones/master_card.png" alt="Mastercard">

            </div>

         </footer>

    </main>
    
</body>
</html>
