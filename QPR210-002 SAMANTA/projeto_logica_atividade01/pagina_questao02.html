<body>
    <div id ="geral">
    <h3> Faça um algoritmo que leia a largura e altura de uma
        parede, calcule e mostre a área a ser pintada e a
        quantidade de tinta necessária para o serviço. Considere
        que cada litro de tinta pinta uma área de 2metros
        quadrados.</h3>

    <form id="formulario">
        <label for="num1">Altura</label>
        <input type="text" name="num1" id="num1"> 

        <label for="num2">Largura</label>
        <input type="text" name="num2" id="num2">

        <button type="submit"> Calcular </button>
        <button type="reset"> Limpar </button>
    </form>
    <div id="resultado"></div>
    </div>
</body>
